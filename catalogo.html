<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Fiber Piscinas</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eaf6ff 0%, #ffffff 100%);
      color: #0f3a5b;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: #0f3a5b;
      color: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .voltar {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    main {
      flex: 1;
      padding: 20px;
    }

    .catalogo-frame {
      width: 100%;
      height: calc(100vh - 120px);
      border: none;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(15, 58, 91, 0.15);
    }

    .fallback {
      margin-top: 16px;
      text-align: center;
    }

    .fallback a {
      color: #0f6aa6;
      font-weight: 700;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Catálogo Fiber Piscinas</h1>
    <a class="voltar" href="./index.html">Voltar ao site</a>
  </header>

  <main>
    <iframe
      class="catalogo-frame"
      src="./catalogo/catalogo-de-piscinas-fiber.pdf"
      title="Catálogo Fiber Piscinas"
    ></iframe>

    <p class="fallback">
      Se o catálogo não aparecer, abra o PDF direto em
      <a href="./catalogo/catalogo-de-piscinas-fiber.pdf" target="_blank" rel="noopener noreferrer">nova aba</a>.
    </p>
  </main>
</body>
</html>
